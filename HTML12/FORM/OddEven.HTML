<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="rossi">
        Enter any number:<input type="number" name="a"><br>
        <input type="button" value="Result" onclick="div()">
    </form>
    <script>
        function div()
        {
            var x=parseInt(document.rossi.a.value)
            if(x%2==0)
            {
                document.write(x," is even number")
            }
            else{
                document.write(x," is odd number")
            }
        }
    </script>
</body>
</html>
