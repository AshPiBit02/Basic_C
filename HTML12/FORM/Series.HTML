<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="oob">
        Enter a series of number:<input type="text" name="a"><br>
        <input type="button" value="Sum" onclick="S()">
    </form>
    <script>
        function S()
        {
        var a=document.oob.a.value
        var x=a.split(" ")
        var sum=0
        for(var i=0;i<x.length;i++)
        sum=sum+parseInt(x[i])
    document.write(sum)
        }
    </script>
</body>
</html>
