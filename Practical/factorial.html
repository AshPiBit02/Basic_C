<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="factorial">
        Enter any numer:<input type="number" name="a">
        <input type="button" value="Result" onclick="fact()">
    </form>
    <script>
        function fact()
        {
            var fact=1
            var x=parseInt(document.factorial.a.value)
            if(x==1 || x==0)
            {
                
            document.write(fact, " is the factorial.")
            }
        else
        {
            
            for( var i=1;i<=x;i++)
            {
            fact=fact*i
            }
        document.write(fact," is the factorial.")
        }
        }
    </script>
</body>
</html>
