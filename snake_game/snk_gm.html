<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; margin: 0; }
        canvas { background: #333; border: 1px solid #fff; }
        h1 { color: white; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div>
        <h1>Snake Game</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let snake = [{ x: 8 * box, y: 8 * box }];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let direction;

        document.addEventListener('keydown', event => {
            if (event.key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
            else if (event.key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
            else if (event.key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
            else if (event.key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            snake.forEach(segment => {
                ctx.fillStyle = 'lime';
                ctx.fillRect(segment.x, segment.y, box, box);
                ctx.strokeStyle = '#222';
                ctx.strokeRect(segment.x, segment.y, box, box);
            });

            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, box, box);

            let head = { x: snake[0].x, y: snake[0].y };

            if (direction === 'UP') head.y -= box;
            if (direction === 'DOWN') head.y += box;
            if (direction === 'LEFT') head.x -= box;
            if (direction === 'RIGHT') head.x += box;

            if (head.x === food.x && head.y === food.y) {
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else {
                snake.pop();
            }

            snake.unshift(head);

            if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height || snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
                clearInterval(game);
                alert('Game Over');
            }
        }

        const game = setInterval(draw, 100);
    </script>
</body>
</html>
