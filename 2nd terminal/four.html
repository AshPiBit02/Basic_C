<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="yyy">
        Enter any number:<input type="number" name="a"><br>
        <input type="button" value="click" onclick="tab()">
    </form>
    <script>
        function tab()
        {
            x=parseInt(document.yyy.a.value);
            for(var i=1;i<=10;i++)
            {
                document.write(x,"x",i,"=",x*i,"<br>");
            }
        }
    </script>
</body>
</html>
